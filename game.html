.stat-lbl{font-size:10px;color:#B07030;margin-bottom:2px;}

function initG(cname,pname,ideolId){
  G={

function load(){try{const s=localStorage.getItem('jks_v4');if(s){G=JSON.parse(s);G.collected=new Set(G._col||[]);}}catch(e){}}
function save(){try{const s={...G,_col:[...G.collected]};delete s.collected;localStorage.setItem('jks_v4',JSON.stringify(s));}catch(e){}}

function getLv(){let c=LEVELS[0];for(const l of LEVELS){if(G.value>=l.min)c=l;else break;}return c;}
function getLaborCost(){return G.staff.reduce((s,st)=>s+(st.onRest?Math.round(st.wage*0.7):st.wage),0);}
function getIdeology(){return IDEOLOGIES.find(i=>i.id===G.ideology)||IDEOLOGIES[0];}
function getMarketState(mid){const idx=G.markets[mid]??2;return MARKET_STATES[Math.min(4,Math.max(0,idx))];}
function getOfficeBonus(){return{sales:0,tech:0,pr:0,luck:0};}
function getStaffBonus(key){return Math.round(G.staff.filter(s=>!s.onRest).reduce((s,st)=>s+(st[key]||0)*(1+(st.xp||0)/200),0));}
function hasSkill(sk){return G.staff.some(s=>!s.onRest&&s.skill===sk);}
function countSkill(sk){return G.staff.filter(s=>!s.onRest&&s.skill===sk).length;}
function getFinanceBonus(){return countSkill('finance')*20;}
function getMotivatorBonus(){return hasSkill('motivator')?10:0;}
function fmt(v){const av=Math.abs(v),sg=v<0?'-':'';if(av>=1000000)return sg+(av/1000000).toFixed(2)+'兆';if(av>=10000)return sg+(av/10000).toFixed(1)+'億';return sg+Math.round(av)+'万';}
function addLog(msg){logs.unshift(msg);}
function stars(n){return'★'.repeat(n)+'☆'.repeat(5-n);}
function repLabel(v){if(v>=80)return'伝説';if(v>=60)return'高評価';if(v>=40)return'普通';if(v>=20)return'低評価';return'無名';}

function calcWinChance(ctx){
  let chance=33;let bd=[];
  const mst=getMarketState(G.activeMarket);
  const mb=Math.round((mst.mult-1)*15);
  if(mb!==0){chance+=mb;bd.push('市場'+(mb>=0?'+':'')+mb+'%');}
  const sb=Math.round(Math.min(getStaffBonus(ctx.statKey||'sales')/5,20));
  if(sb>0){chance+=sb;bd.push('社員力+'+sb+'%');}
  const rb=Math.round((G.trust+G.fame)/20);
  if(rb>0){chance+=rb;bd.push('企業評価+'+rb+'%');}
  const lb=countSkill('lucky')*8;
  if(lb>0){chance+=lb;bd.push('強運+'+lb+'%');}
  const ideo=getIdeology();
  if(ideo.id==='challenge'){chance+=5;bd.push('挑戦理念+5%');}
  if(ctx.type==='dev'&&hasSkill('dev_ace')){chance+=20;bd.push('開発エース+20%');}
  if(ctx.type==='ad'&&hasSkill('pr_boost')){chance+=10;bd.push('広報ブースト+10%');}
  if(hasSkill('analyst')){const ab=Math.round(mst.mult*8);chance+=ab;bd.push('市場分析+'+ab+'%');}
  if(ideo.id==='tech'&&ctx.type==='dev'){chance+=(ideo.bonus.devBonus||0);bd.push('技術理念+'+ideo.bonus.devBonus+'%');}
  chance=Math.max(10,Math.min(90,chance));
  return{chance,breakdown:bd};
}

function generateProjects(){
  const ideo=getIdeology();
  const mst=getMarketState(G.activeMarket);

  const du=hasSkill('design_up')?1.15:1;
  const startupUp=hasSkill('startup')?2:1;
  const base=[
    {type:'small',name:'小規模案件',icon:'📝',desc:mdef?.name+'市場の小さな仕事',statKey:'sales',reward:Math.round(50*mst.mult*mm*du),losePct:0.2,risk:'リスク低',rc:'risk-low',ptReward:1},
    {type:'mid',name:'中規模案件',icon:'📦',desc:mdef?.name+'の中型プロジェクト',statKey:'sales',reward:Math.round(150*mst.mult*mm*du),losePct:0.4,risk:'リスク中',rc:'risk-mid',ptReward:2},
    {type:'dev',name:'開発案件',icon:'💻',desc:'技術力が決め手の案件',statKey:'tech',reward:Math.round(120*mst.mult*mm),losePct:0.3,risk:'リスク中',rc:'risk-mid',ptReward:2},
    {type:'ad',name:'広告展開',icon:'📢',desc:'企業価値・知名度を引き上げ',statKey:'pr',reward:Math.round(80*mst.mult),losePct:0.15,risk:'リスク低',rc:'risk-low',ptReward:1},
  ];
  if(Math.random()<0.5*bigRate*startupUp){
    base.push({type:'big',name:'大型案件',icon:'🤝',desc:'一発逆転の大型交渉',statKey:'sales',reward:Math.round(500*mst.mult*mm*du),losePct:0.8*lossMult,risk:'リスク高',rc:'risk-high',ptReward:4});
  }
  if(Math.random()<0.2*bigRate){
    base.push({type:'national',name:'国家プロジェクト',icon:'🏛️',desc:'国家規模の超大型案件',statKey:'sales',reward:Math.round(5000*mst.mult*mm),losePct:1.0,risk:'リスク最高',rc:'risk-max',ptReward:8});
  }
  return base;
}

function selectProject(idx){
  const p=_projects[idx];
  const ideo=getIdeology();
  const wc=calcWinChance({statKey:p.statKey,type:p.type});
  const loss=Math.round(p.reward*p.losePct*(ideo.bonus.lossMult||1));
  pendingJK={
    label:p.name,winChance:wc.chance,breakdown:wc.breakdown,ptReward:p.ptReward||0,
    desc:`📋 ${p.name}\n勝利: +${fmt(p.reward)}万 / 失注: -${fmt(loss)}万\n${p.desc}`,
    onWin(){
      const tot=Math.round(p.reward*(1+Math.random()*0.3));
      G.money+=tot;G.value+=Math.round(tot*0.4);
      G.gachaPt+=(p.ptReward||0)+(hasSkill('connector')?1:0);
      G.fame=Math.min(100,G.fame+2);G.trust=Math.min(100,G.trust+3);
      if(p.type==='dev')G.techRep=Math.min(100,G.techRep+4);
      if(p.type==='ad'){G.fame=Math.min(100,G.fame+5);G.value+=Math.round(p.reward*0.5);}
      G.staff.forEach(s=>{s.xp=(s.xp||0)+2;});
      addLog('['+p.name+'] 契約成立！ +'+tot+'万');
      addHistory(p.name+'受注成功');
      return'+'+tot+'万円の契約成立！';
    },
    onDraw(){
      const d=Math.round(p.reward*0.1);G.money+=d;
      addLog('['+p.name+'] 再交渉 +'+d+'万');
      return'引き分け、部分報酬 +'+d+'万';
    },
    onLose(){
      let actualLoss=loss;
      if(hasSkill('sales_shield')&&p.type!=='national'){actualLoss=Math.round(loss*0.5);addLog('[営業ガード] 損失半減！');}
      G.money-=actualLoss;G.trust=Math.max(0,G.trust-2);
      addLog('['+p.name+'] 失注 -'+actualLoss+'万');
      return'失注... -'+actualLoss+'万の損失';
    }
  };
  showJKScreen(p.name);
}

function playJK(myHand){
  const wc=pendingJK.winChance||33;
  const roll=Math.random()*100;
  let out=roll<wc?'win':(roll<wc+10?'draw':'lose');
  const winners={グー:'チョキ',チョキ:'パー',パー:'グー'};
  const losers={グー:'パー',チョキ:'グー',パー:'チョキ'};
  const enHand=out==='win'?winners[myHand]:out==='draw'?myHand:losers[myHand];
  document.getElementById('jk-hands').style.display='none';
  document.getElementById('jk-vs').textContent=HEMOJI[myHand]+' VS '+HEMOJI[enHand];
  let sub='',badge='';
  if(out==='win'){G.wins++;sub=pendingJK.onWin();badge=`<span class="result-badge win-badge">勝利！契約成立！</span>`;}
  else if(out==='draw'){G.draws++;sub=pendingJK.onDraw();badge=`<span class="result-badge draw-badge">引き分け</span>`;}
  else{G.losses++;sub=pendingJK.onLose();badge=`<span class="result-badge lose-badge">敗北... 失注</span>`;}
  document.getElementById('jk-outcome-badge').innerHTML=badge;
  document.getElementById('jk-sub').textContent=sub;
  document.getElementById('jk-result').style.display='block';
  if(G.money<-200&&G.value<=0){G.money=100;G.value=100;G.staff=[];addLog('💸 倒産！再起動');}
  save();updateTop();
}

function afterJK(){showScreen('main-screen');advanceTurn();}

function advanceTurn(){
  G.turn++;G.day+=3;
  G.staff.forEach(s=>{
    s.morale=s.onRest?Math.min(100,(s.morale||50)+10):Math.max(0,(s.morale||50)-2);
    s.morale=Math.min(100,s.morale+getMotivatorBonus());
    s.morale=Math.max(0,Math.min(100,s.morale+(getIdeology().bonus.moraleMod||0)*0.1));
  });
  const finBonus=getFinanceBonus();
  if(finBonus>0){G.money+=finBonus;addLog('📊 経理ボーナス +'+finBonus+'万');}
  const stable=getIdeology().bonus.stableIncome||0;
  if(G.day>=G.nextPayday)doPayday(stable);
  if(G.turn%8===0&&Math.random()<0.5)triggerRandomEvent();
  if(G.turn%20===0)shiftMarkets();
  checkMilestones();
  save();switchTab('home');
}

function doPayday(stable){
  G.nextPayday+=30;
  if(stable>0){G.money+=stable;addLog('🏘️ 安定収入 +'+stable+'万');}
  const labor=getLaborCost();
  if(labor===0){addLog('💸 給料日（無給）');return;}
  if(G.money>=labor){G.money-=labor;G.totalLabor+=labor;addLog('✅ 給料日 -'+labor+'万');}
  else{
    addLog('⚠️ 給料不足！社員を1名解雇');
    if(G.staff.length>0){const f=G.staff.pop();addLog('😢 リストラ: '+f.name);}
    G.money=Math.max(0,G.money-labor);
  }
}

function shiftMarkets(){
  MARKET_DEFS.forEach(m=>{const d=Math.floor(Math.random()*3)-1;G.markets[m.id]=Math.max(0,Math.min(4,(G.markets[m.id]??2)+d));});
  addLog('📊 市場状況が変動した！');
}

function addHistory(text){
  const year=G.yearFounded+Math.floor(G.day/365);
  G.history.push({year,text});
  if(G.history.length>20)G.history.shift();
}

function checkMilestones(){
  if(G.staff.length>=5&&!G._m5){G._m5=true;addHistory('社員5名突破');addLog('🎉 社員5名突破！');}
  if(G.staff.length>=20&&!G._m20){G._m20=true;addHistory('社員20名突破');}
  if(G.wins>=10&&!G._w10){G._w10=true;addHistory('10勝達成');}
  if(G.value>=5000&&!G._v5k){G._v5k=true;addHistory('上場企業規模に到達');}
  if(G.value>=50000&&!G._v50k){G._v50k=true;addHistory('世界企業へ進出');}
}

function triggerRandomEvent(){
  const ev=RANDOM_EVENTS[Math.floor(Math.random()*RANDOM_EVENTS.length)];
  pendingEvent=ev;
  let h=`<div style="text-align:center;margin-bottom:14px;">
    <div style="font-size:22px;font-weight:700;margin-bottom:6px;">${ev.name}</div>
    <div style="font-size:12px;color:#B07030;line-height:1.6;">${ev.desc}</div>
  </div>`;
  ev.choices.forEach((c,i)=>{
    h+=`<button class="btn${i===0?' btn-primary':''}" onclick="resolveEvent(${i})">${c.label}</button>`;
  });
  document.getElementById('event-modal-content').innerHTML=h;
  document.getElementById('event-modal').style.display='flex';
}

function resolveEvent(idx){
  if(pendingEvent){pendingEvent.choices[idx].act(G);addLog('🎲 イベント: '+pendingEvent.name);pendingEvent=null;}
  document.getElementById('event-modal').style.display='none';
  save();updateTop();
}

function toggleRest(i){G.staff[i].onRest=!G.staff[i].onRest;const s=G.staff[i];if(s.onRest){s.morale=Math.min(100,(s.morale||50)+15);addLog('😴 '+s.name+'が休暇（士気+15）');}else{addLog('💪 '+s.name+'が復帰！');}save();renderStaff();updateTop();}
function trainStaff(i){if(G.money<30){alert('資金不足！30万必要');return;}G.money-=30;const s=G.staff[i];s.xp=(s.xp||0)+25;s.morale=Math.min(100,(s.morale||50)+10);const keys=['sales','tech','pr','luck'];const k=keys[Math.floor(Math.random()*keys.length)];s[k]+=2;addLog('📚 '+s.name+' 特訓！'+k+'+2');save();renderStaff();updateTop();}
function fireStaff(i){if(confirm(G.staff[i].name+'を解雇しますか？')){const f=G.staff.splice(i,1)[0];addLog('🔥 '+f.name+'を解雇');save();renderStaff();updateTop();}}

function renderGacha(){
  const ideo=getIdeology();
  const cost=Math.max(1,GACHA_COST_PT+(ideo.bonus.gachaCostMod||0));
  let h=`<div class="card"><div class="card-title">🎰 社員採用ガチャ</div>
    <div style="background:#FFF3CD;border-radius:10px;padding:9px 12px;margin-bottom:10px;border:1.5px solid #FED7AA;">

      <div style="font-size:11px;color:#92400E;margin-top:4px;line-height:1.6;">案件勝利でpt獲得！小規模+1 / 中規模+2 / 大型+4 / 国家+8<br>現在所持: <b>${G.gachaPt}pt</b></div>
    </div>
    <div style="text-align:center;background:#FFF8F0;border-radius:10px;padding:10px;margin-bottom:10px;border:1.5px solid #FFD5A0;">
      <div style="font-size:24px;font-weight:700;color:#FF8C00;">${G.gachaPt}<span style="font-size:13px;">pt</span></div>
      <div style="font-size:11px;color:#B07030;">1回 ${cost}pt / 10連 ${cost*10}pt${ideo.bonus.gachaCostMod?` (理念割引${ideo.bonus.gachaCostMod}pt)`:''}</div>
    </div>
    <button class="btn btn-gacha" onclick="doGacha(1,${cost})" ${G.gachaPt<cost?'disabled style="opacity:0.5;"':''}>🎰 1回引く (${cost}pt)</button>
    <button class="btn btn-gacha" onclick="doGacha(10,${cost})" style="background:linear-gradient(135deg,#7C3AED,#DB2777);" ${G.gachaPt<cost*10?'disabled style="opacity:0.5;background:linear-gradient(135deg,#7C3AED,#DB2777);"':''}>🎰✨ 10連 (${cost*10}pt)</button>
  </div>
  <div class="card"><div class="card-title">排出率</div>
    ${RARITIES.map((r,i)=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #FFE8C0;"><span class="rarity-${r.toLowerCase()}" style="font-weight:700;">${r}</span><span style="font-size:11px;color:#B07030;">${RARITY_WEIGHT[i]}%</span></div>`).join('')}
  </div>`;
  document.getElementById('view-gacha').innerHTML=h;
}

function rollRarity(){let r=Math.random()*100;for(let i=0;i<RARITIES.length;i++){if((r-=RARITY_WEIGHT[i])<=0)return RARITIES[i];}return'N';}

function doGacha(times,cost){
  if(G.gachaPt<cost*times){alert('採用ポイントが足りません！');return;}
  G.gachaPt-=cost*times;G.gachaCount=(G.gachaCount||0)+times;
  const ideo=getIdeology();
  const results=[];
  for(let i=0;i<times;i++){
    const r=rollRarity();
    const pool=STAFF_DB.filter(s=>s.rarity===r);
    const base=pool[Math.floor(Math.random()*pool.length)];
    const s={...base,xp:0,morale:Math.max(0,Math.min(100,50+(ideo.bonus.moraleMod||0))),onRest:false};
    const isNew=!G.collected.has(s.id);
    G.collected.add(s.id);G.staff.push(s);G.hired++;
    addLog('🎰 採用: '+s.name+' ['+s.rarity+']'+(isNew?' NEW!':''));
    results.push({...s,isNew});
  }
  save();updateTop();
  let h='';
  if(results.length===1){
    const s=results[0];const bc='badge-'+s.rarity.toLowerCase();const sk=SKILLS[s.skill];
    h=`<div style="text-align:center;padding:16px 0;">
      ${s.isNew?`<div style="background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:4px 14px;border-radius:99px;display:inline-block;margin-bottom:10px;">NEW RECRUIT!</div>`:''}
      <div class="gacha-card-anim" style="background:#FFF8F0;border-radius:20px;border:3px solid #FF8C00;padding:18px;margin-bottom:14px;display:inline-block;min-width:190px;">
        <div style="font-size:48px;margin-bottom:6px;">${s.emoji}</div>
        <div style="font-size:17px;font-weight:700;margin-bottom:4px;">${s.name}</div>
        <span class="${bc}">${s.rarity}</span>
        <div style="font-size:11px;color:#B07030;margin:5px 0;">${s.role}</div>
        <div style="font-size:10px;color:#6B7280;font-style:italic;margin-bottom:7px;">${s.desc}</div>
        ${sk?`<div style="background:#EEF2FF;border-radius:7px;padding:4px 9px;margin-bottom:7px;font-size:10px;color:#4338CA;font-weight:700;">⚡${sk.name}: ${sk.desc}</div>`:''}
        <div class="stat-pills" style="justify-content:center;"><span class="stat-pill">営業${s.sales}</span><span class="stat-pill">技術${s.tech}</span><span class="stat-pill">広報${s.pr}</span><span class="stat-pill">運${s.luck}</span></div>
      </div>
    </div>`;
  }else{
    h=`<div style="padding-bottom:8px;"><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">`;
    results.forEach(s=>{const bc='badge-'+s.rarity.toLowerCase();
      h+=`<div class="gacha-card-anim" style="background:#FFF8F0;border-radius:12px;border:2px solid ${s.rarity==='UR'?'#DC2626':s.rarity==='SSR'?'#D97706':s.rarity==='SR'?'#7C3AED':'#FFD5A0'};padding:9px;text-align:center;">
        ${s.isNew?`<div style="font-size:8px;color:#D97706;font-weight:700;">NEW</div>`:''}
        <div style="font-size:26px;">${s.emoji}</div>
        <div style="font-size:11px;font-weight:700;">${s.name}</div>
        <span class="${bc}">${s.rarity}</span>
      </div>`;
    });
    h+=`</div></div>`;
  }
  document.getElementById('gacha-result-content').innerHTML=h;
  showScreen('gacha-screen');
}
function closeGachaScreen(){showScreen('main-screen');switchTab('gacha');}
